services:
  postgres:
    image: postgres:16-alpine
    container_name: job-market-postgres

    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

    networks:
      - job-market-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: job-market-backend

    environment:
      APP_NAME: ${APP_NAME}
      ENVIRONMENT: ${ENVIRONMENT}
      DEBUG: ${DEBUG}

      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}

      ADZUNA_BASE_URL: ${ADZUNA_BASE_URL}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY}

      LOG_LEVEL: ${LOG_LEVEL}

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy

    command: >
      sh -c "
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting FastAPI...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import requests; r=requests.get('http://localhost:8000/api/v1/health', timeout=5); exit(0 if r.status_code == 200 else 1)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    restart: unless-stopped

    networks:
      - job-market-network

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile

    container_name: job-market-dashboard

    environment:
      API_BASE_URL: http://backend:8000
      ENVIRONMENT: ${ENVIRONMENT}
      LOG_LEVEL: ${LOG_LEVEL}

    ports:
      - "8501:8501"

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import requests; r=requests.get('http://localhost:8501/_stcore/health', timeout=5); exit(0 if r.status_code == 200 else 1)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    restart: unless-stopped

    networks:
      - job-market-network

networks:
  job-market-network:
    driver: bridge

volumes:
  postgres_data: