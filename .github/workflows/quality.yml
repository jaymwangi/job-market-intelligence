# .github/workflows/quality.yml
name: Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.13'
  POSTGRES_USER: jobuser
  POSTGRES_PASSWORD: jobpass
  POSTGRES_DB: jobmarket
  DATABASE_URL: postgresql://jobuser:jobpass@localhost:5432/jobmarket

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r dashboard/requirements.txt
          pip install ruff black mypy pytest pytest-cov
      
      - name: Ruff
        run: ruff check .
      
      - name: Black
        run: black --check .
      
      - name: MyPy
        run: mypy app dashboard
      
      - name: Run unit tests
        run: pytest tests/unit -v --cov=app --cov=dashboard --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r dashboard/requirements.txt
          pip install pytest pytest-cov
      
      - name: Run Alembic migrations
        run: alembic upgrade head
      
      - name: Run integration tests
        run: pytest tests/integration -v --cov=app --cov=dashboard --cov-report=xml --cov-append
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: integrationtests
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: [quality, integration]
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate Docker Compose
        run: docker compose config
      
      - name: Build Backend Image
        run: docker build -t job-market-backend:ci .
      
      - name: Build Dashboard Image
        run: docker build -f dashboard/Dockerfile -t job-market-dashboard:ci .