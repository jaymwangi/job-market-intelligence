services:
  - type: web
    name: job-market-intelligence-api
    runtime: docker
    plan: free

    autoDeploy: true

    healthCheckPath: /api/v1/health/live

    envVars:
      - key: ENVIRONMENT
        value: production

      - key: DEBUG
        value: "false"

      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        sync: false

      - key: LOG_LEVEL
        value: INFO

      - key: LOG_FORMAT
        value: json