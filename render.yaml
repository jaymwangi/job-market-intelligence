services:
  - type: web
    name: job-market-intelligence-api
    runtime: python

    buildCommand: pip install -r requirements.txt

    startCommand: >
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1

    healthCheckPath: /api/v1/health/live

    autoDeploy: true

    envVars:
      - key: ENVIRONMENT
        value: production

      - key: DEBUG
        value: "false"

      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        sync: false

      - key: LOG_LEVEL
        value: INFO

      - key: LOG_FORMAT
        value: json